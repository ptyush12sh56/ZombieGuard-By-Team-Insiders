<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZombieGuard — Zombie API Discovery & Defence | iDEA 2.0 | PS9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:#050a0f;--bg1:#080e16;--bg2:#0d1520;--bg3:#111d2c;--bg4:#162335;
  --border:#1e3050;--border2:#263d60;
  --red:#e8242c;--red2:#b81820;--red-t:rgba(232,36,44,.12);
  --teal:#00d4a8;--teal2:#00a882;--teal-t:rgba(0,212,168,.1);
  --amber:#f5a623;--amber-t:rgba(245,166,35,.1);
  --purple:#9b59f5;--purple-t:rgba(155,89,245,.1);
  --blue:#1e6fff;--blue-t:rgba(30,111,255,.1);
  --green:#1db954;--green-t:rgba(29,185,84,.1);
  --txt0:#dde8f5;--txt1:#7a9ab8;--txt2:#3d5570;--txt3:#1d3050;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt0);font-family:'Instrument Sans',sans-serif;min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse 80% 40% at 50% -20%,rgba(0,212,168,.06) 0%,transparent 60%),linear-gradient(180deg,var(--bg) 0%,var(--bg1) 100%)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:60px 60px;opacity:.35}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--bg1);border-radius:2px;cursor:pointer;accent-color:var(--teal)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--teal);cursor:pointer;border:2px solid var(--bg2)}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,212,168,.3)}50%{opacity:.6;box-shadow:0 0 0 4px transparent}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(232,36,44,.2)}50%{box-shadow:0 0 40px rgba(232,36,44,.5)}}
#loading{display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--red);text-shadow:0 0 30px rgba(232,36,44,.4);position:relative;z-index:1}
</style>
</head>
<body>
<div id="loading">🧟 ZOMBIEGUARD LOADING…</div>
<div id="root"></div>
<script type="text/babel" data-presets="react">


const API = "";

/* ─── design tokens ────────────────────────────────── */
const C = {
  bg: "#050a0f", bg1: "#080e16", bg2: "#0d1520", bg3: "#111d2c", bg4: "#162335",
  border: "#1e3050", border2: "#263d60",
  red: "#e8242c", red2: "#b81820", redT: "rgba(232,36,44,.12)",
  teal: "#00d4a8", teal2: "#00a882", tealT: "rgba(0,212,168,.1)",
  amber: "#f5a623", amberT: "rgba(245,166,35,.1)",
  purple: "#9b59f5", purpleT: "rgba(155,89,245,.1)",
  blue: "#1e6fff", blueT: "rgba(30,111,255,.1)",
  green: "#1db954", greenT: "rgba(29,185,84,.1)",
  txt0: "#dde8f5", txt1: "#7a9ab8", txt2: "#3d5570", txt3: "#1d3050",
};

/* ─── global styles ────────────────────────────────── */
const GLOBAL_CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html,body,#root { height:100%; }
  body {
    background: ${C.bg};
    color: ${C.txt0};
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -20%, rgba(0,212,168,.06) 0%, transparent 60%),
      linear-gradient(180deg, ${C.bg} 0%, ${C.bg1} 100%);
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(${C.border} 1px, transparent 1px),
      linear-gradient(90deg, ${C.border} 1px, transparent 1px);
    background-size: 60px 60px; opacity:.35;
  }
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-thumb { background:${C.border2}; border-radius:2px; }
  input[type=range] {
    -webkit-appearance:none; width:100%; height:3px;
    background:${C.bg1}; border-radius:2px; cursor:pointer; accent-color:${C.teal};
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:${C.teal}; cursor:pointer; border:2px solid ${C.bg2};
  }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,212,168,.3)} 50%{opacity:.6;box-shadow:0 0 0 4px transparent} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
`;

/* ─── tiny helpers ──────────────────────────────────── */
const mono = { fontFamily: "'IBM Plex Mono', monospace" };
const display = { fontFamily: "'Bebas Neue', sans-serif" };
const fade = (delay = 0) => ({
  animation: `fadeInUp .4s ease ${delay}s both`,
});

/* ─── API calls ─────────────────────────────────────── */
async function apiFetch(path, opts = {}) {
  const r = await fetch(API + path, { headers: { "Content-Type": "application/json" }, ...opts });
  if (!r.ok) throw new Error(r.status + " " + r.statusText);
  return r.json();
}
const apiPost = (path, body) => apiFetch(path, { method: "POST", body: JSON.stringify(body) });

/* ─── reusable components ───────────────────────────── */
function Panel({ children, style }) {
  return (
    <div style={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 8, padding: 16, ...style }}>
      {children}
    </div>
  );
}
function PanelHdr({ title, right }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
      <span style={{ ...mono, fontSize: 10, color: C.txt2, textTransform: "uppercase", letterSpacing: "2px" }}>{title}</span>
      {right}
    </div>
  );
}
function Badge({ children, color = C.teal, bg = C.tealT, border = C.teal2 }) {
  return (
    <span style={{ ...mono, fontSize: 9, padding: "2px 7px", borderRadius: 2, background: bg, color, border: `1px solid ${border}` }}>
      {children}
    </span>
  );
}
function ToolChip({ children, color, bg }) {
  return (
    <span style={{ ...mono, fontSize: 9, padding: "2px 7px", borderRadius: 2, background: bg, color, border: `1px solid ${color}`, margin: 2, display: "inline-flex" }}>
      {children}
    </span>
  );
}
function Cls({ cls }) {
  const map = {
    ZOMBIE: [C.red, C.redT], SHADOW: [C.purple, C.purpleT],
    ACTIVE: [C.teal, C.tealT], DEPRECATED: [C.amber, C.amberT],
  };
  const [color, bg] = map[cls] || [C.txt1, C.bg3];
  return <span style={{ ...mono, fontSize: 9, padding: "1px 6px", borderRadius: 2, background: bg, color }}>{cls}</span>;
}
function RiskChip({ score }) {
  const [color, bg, border] =
    score >= 80 ? [C.red, C.redT, C.red2]
    : score >= 60 ? [C.amber, C.amberT, C.amber]
    : score >= 40 ? [C.blue, C.blueT, C.blue]
    : [C.teal, C.tealT, C.teal2];
  return <span style={{ ...mono, fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 2, background: bg, color, border: `1px solid ${border}` }}>{score}</span>;
}
function ScoreBar({ score }) {
  const color = score >= 80 ? C.red : score >= 60 ? C.amber : score >= 40 ? C.blue : C.teal;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, verticalAlign: "middle" }}>
      <span style={{ width: 55, height: 4, background: C.bg1, borderRadius: 2, overflow: "hidden", display: "inline-block" }}>
        <span style={{ width: `${score}%`, height: "100%", background: color, display: "block", borderRadius: 2 }} />
      </span>
    </span>
  );
}
function Btn({ children, onClick, disabled, style, variant = "default" }) {
  const base = {
    display: "inline-flex", alignItems: "center", gap: 5, padding: "7px 14px",
    borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer",
    border: `1px solid ${C.border2}`, background: C.bg3, color: C.txt0,
    transition: "all .15s", opacity: disabled ? 0.35 : 1, fontFamily: "'Instrument Sans', sans-serif",
  };
  const variants = {
    primary: { background: C.red, borderColor: C.red, color: "#fff" },
    teal: { background: C.tealT, borderColor: C.teal2, color: C.teal },
    danger: { background: C.redT, borderColor: C.red2, color: C.red },
    amber: { background: C.amberT, borderColor: C.amber, color: C.amber },
    blue: { background: C.blueT, borderColor: C.blue, color: C.blue },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...base, ...(variants[variant] || {}), ...style }}>
      {children}
    </button>
  );
}
function Toggle({ on, onChange, label }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 9, fontSize: 11, color: C.txt1, padding: "5px 0", cursor: "pointer" }} onClick={() => onChange(!on)}>
      <span style={{
        width: 34, height: 18, borderRadius: 9, background: on ? C.teal : C.bg1,
        border: `1px solid ${on ? C.teal2 : C.border2}`, cursor: "pointer",
        position: "relative", transition: "all .2s", flexShrink: 0,
        boxShadow: on ? `0 0 10px ${C.tealT}` : "none",
      }}>
        <span style={{
          position: "absolute", top: 2, left: on ? 18 : 2, width: 12, height: 12,
          borderRadius: "50%", background: "#fff", transition: "left .2s",
        }} />
      </span>
      {label}
    </div>
  );
}
function Inp({ value, onChange, placeholder, style }) {
  return (
    <input
      value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ background: C.bg1, border: `1px solid ${C.border2}`, borderRadius: 8, color: C.txt0, padding: "7px 10px", fontSize: 11, fontFamily: "'Instrument Sans', sans-serif", width: "100%", ...style }}
    />
  );
}
function EmptyState({ icon, text }) {
  return (
    <div style={{ textAlign: "center", padding: 36, color: C.txt2, fontSize: 11, border: `1px dashed ${C.border}`, borderRadius: 8, background: C.bg1 }}>
      <div style={{ fontSize: 28, marginBottom: 8 }}>{icon}</div>
      {text}
    </div>
  );
}
function StatCard({ val, label, color = C.teal }) {
  return (
    <div style={{ background: C.bg3, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px", textAlign: "center" }}>
      <div style={{ ...display, fontSize: 24, color, marginBottom: 2 }}>{val}</div>
      <div style={{ ...mono, fontSize: 9, color: C.txt2, textTransform: "uppercase", letterSpacing: "1px" }}>{label}</div>
    </div>
  );
}
function DefRow({ icon, iconBg, title, sub, ep, time, auto }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: C.bg3, border: `1px solid ${C.border}`, borderRadius: 6, marginBottom: 6 }}>
      <div style={{ width: 34, height: 34, borderRadius: 6, background: iconBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{icon}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 1 }}>{title}</div>
        <div style={{ ...mono, fontSize: 9, color: C.teal, marginBottom: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ep}</div>
        <div style={{ fontSize: 10, color: C.txt1 }}>{sub}</div>
      </div>
      <div style={{ ...mono, fontSize: 9, color: C.txt2, textAlign: "right", flexShrink: 0 }}>
        {time}<br /><span style={{ color: auto ? C.teal : C.amber }}>{auto ? "AUTO" : "MANUAL"}</span>
      </div>
    </div>
  );
}
function LiveExample({ text }) {
  return (
    <div style={{ background: C.redT, border: `1px solid ${C.red2}`, borderRadius: 6, padding: "9px 12px", ...mono, fontSize: 10, color: C.red, marginTop: 10, display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.red, animation: "pulse 1s infinite", flexShrink: 0, display: "inline-block" }} />
      {text}
    </div>
  );
}
function SecDiv() {
  return <div style={{ height: 1, background: `linear-gradient(90deg, ${C.red}, ${C.teal}, transparent)`, margin: "14px 0", opacity: .4 }} />;
}
function ProgressBar({ label, val, max, color }) {
  return (
    <div style={{ marginBottom: 9 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 3 }}>
        <span style={{ color: C.txt1 }}>{label}</span>
        <span style={{ ...mono, color }}>{val}/{max}</span>
      </div>
      <div style={{ height: 3, background: C.bg1, borderRadius: 2, overflow: "hidden" }}>
        <div style={{ width: `${max ? (val / max) * 100 : 0}%`, height: "100%", borderRadius: 2, background: color }} />
      </div>
    </div>
  );
}

/* ─── SIDEBAR ───────────────────────────────────────── */
const NAV_ITEMS = [
  { id: "dashboard", label: "Dashboard", icon: "◈", section: "Overview" },
  { id: "scan", label: "Run Scan", icon: "▶", section: null },
  { id: "input", label: "1. Input Sources", icon: "⊡", section: "Pipeline — Slide 5" },
  { id: "kafka", label: "2. Kafka Stream", icon: "⚡", section: null },
  { id: "mldetect", label: "3. ML Detection", icon: "⬡", section: null },
  { id: "riskengine", label: "4. Risk Engine", icon: "◉", section: null },
  { id: "dbstore", label: "5. Database Store", icon: "▣", section: null },
  { id: "inventory", label: "API Inventory", icon: "☰", section: "Outputs — Slide 4", badge: "inv" },
  { id: "defence", label: "Auto Defence", icon: "⊛", section: null },
  { id: "alertengine", label: "Alert Engine", icon: "◈", section: null, badge: "alert" },
  { id: "owasp", label: "OWASP Coverage", icon: "⊕", section: "Analysis" },
  { id: "impact", label: "Impact & Benefits", icon: "▲", section: null },
  { id: "compare", label: "vs Competitors", icon: "≋", section: null },
  { id: "calculator", label: "Risk Calculator", icon: "⊞", section: null },
  { id: "sessions", label: "Scan History", icon: "⊟", section: null },
];

function Sidebar({ active, onNav, badges }) {
  let lastSection = null;
  return (
    <div style={{ width: 240, flexShrink: 0, background: C.bg1, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", position: "fixed", top: 0, left: 0, height: "100vh", overflowY: "auto", zIndex: 50 }}>
      {/* Logo */}
      <div style={{ padding: "20px 16px 16px", borderBottom: `1px solid ${C.border}`, background: C.bg }}>
        <div style={{ ...display, fontSize: 26, letterSpacing: 3, color: C.red, lineHeight: 1, textShadow: `0 0 30px rgba(232,36,44,.4)` }}>ZOMBIE</div>
        <div style={{ ...display, fontSize: 26, letterSpacing: 3, color: C.txt0, lineHeight: 1 }}>GUARD</div>
        <div style={{ ...mono, fontSize: 8.5, color: C.txt2, marginTop: 8, lineHeight: 1.5 }}>
          Zombie API Discovery & Defence<br />iDEA 2.0 · PS9 · Team Insiders<br />Union Bank of India
        </div>
        <div style={{ display: "flex", gap: 4, marginTop: 10, flexWrap: "wrap" }}>
          <span style={{ ...mono, fontSize: 8, padding: "2px 6px", borderRadius: 2, border: `1px solid ${C.red2}`, color: C.red, background: C.redT }}>CRITICAL SYSTEM</span>
          <span style={{ ...mono, fontSize: 8, padding: "2px 6px", borderRadius: 2, border: `1px solid ${C.border2}`, color: C.txt2 }}>v1.0 POC</span>
        </div>
      </div>
      {/* Nav */}
      <div style={{ flex: 1 }}>
        {NAV_ITEMS.map(item => {
          const showSection = item.section && item.section !== lastSection;
          if (item.section) lastSection = item.section;
          return (
            <div key={item.id}>
              {showSection && (
                <div style={{ padding: "10px 16px 3px", ...mono, fontSize: 9, color: C.txt3, letterSpacing: 3, textTransform: "uppercase", marginTop: 8 }}>
                  {item.section}
                </div>
              )}
              <div
                onClick={() => onNav(item.id)}
                style={{
                  display: "flex", alignItems: "center", gap: 9, padding: "9px 16px", cursor: "pointer",
                  color: active === item.id ? C.teal : C.txt1, fontSize: 12, fontWeight: 500,
                  borderLeft: `2px solid ${active === item.id ? C.teal : "transparent"}`,
                  background: active === item.id ? C.tealT : "transparent",
                  transition: "all .12s",
                }}
              >
                <span style={{ fontSize: 13, width: 16, textAlign: "center" }}>{item.icon}</span>
                <span style={{ flex: 1 }}>{item.label}</span>
                {item.badge && badges[item.badge] ? (
                  <span style={{ ...mono, fontSize: 9, padding: "1px 5px", borderRadius: 2, background: C.redT, color: C.red, border: `1px solid ${C.red2}` }}>
                    {badges[item.badge]}
                  </span>
                ) : null}
              </div>
            </div>
          );
        })}
      </div>
      {/* Footer */}
      <div style={{ padding: "12px 16px", borderTop: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, ...mono, fontSize: 9, color: C.txt2, marginBottom: 6 }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: C.teal, animation: "pulse 2s infinite", flexShrink: 0, display: "inline-block" }} />
          <span id="sidebar-be">Connecting…</span>
        </div>
        <div style={{ ...mono, fontSize: 8, color: C.txt3, lineHeight: 1.7 }}>
          FastAPI · scikit-learn<br />NumPy · BeautifulSoup4<br />SQL Alchemy · Kafka<br />Pydantic · Uvicorn
        </div>
      </div>
    </div>
  );
}

/* ─── TOPBAR ────────────────────────────────────────── */
const PAGE_TITLES = {
  dashboard: "DASHBOARD", scan: "RUN SCAN", input: "INPUT SOURCES", kafka: "KAFKA STREAMING BUS",
  mldetect: "ML DETECTION ENGINE", riskengine: "RISK ENGINE", dbstore: "DATABASE STORE",
  inventory: "API INVENTORY", defence: "AUTO DEFENCE", alertengine: "ALERT ENGINE",
  owasp: "OWASP COVERAGE", impact: "IMPACT & BENEFITS", compare: "COMPETITOR COMPARISON",
  calculator: "RISK CALCULATOR", sessions: "SCAN HISTORY",
};
function Topbar({ active, onScan, scanning }) {
  return (
    <div style={{ height: 54, background: "rgba(8,14,22,.9)", backdropFilter: "blur(12px)", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", padding: "0 20px", gap: 12, position: "sticky", top: 0, zIndex: 40, flexShrink: 0 }}>
      <div style={{ ...display, fontSize: 18, letterSpacing: 2, flex: 1 }}>{PAGE_TITLES[active] || active.toUpperCase()}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, ...mono, fontSize: 10, color: C.txt1 }}>
        <span style={{ width: 6, height: 6, borderRadius: "50%", background: C.teal, animation: "pulse 2s infinite", display: "inline-block" }} />
        <span id="tb-status">Connecting…</span>
      </div>
      <button
        onClick={onScan} disabled={scanning}
        style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", background: scanning ? C.bg4 : C.red, border: "none", borderRadius: 8, color: scanning ? C.txt2 : "#fff", ...mono, fontSize: 11, fontWeight: 600, cursor: scanning ? "not-allowed" : "pointer", letterSpacing: ".5px", boxShadow: scanning ? "none" : `0 0 20px rgba(232,36,44,.3)`, transition: "all .15s" }}
      >
        {scanning ? <span style={{ width: 12, height: 12, border: `2px solid ${C.border2}`, borderTopColor: C.teal, borderRadius: "50%", animation: "spin .6s linear infinite", display: "inline-block" }} /> : "▶"} RUN SCAN
      </button>
      <a href="/docs" target="_blank" style={{ display: "flex", alignItems: "center", gap: 5, padding: "7px 12px", background: "transparent", border: `1px solid ${C.border2}`, borderRadius: 8, color: C.txt1, ...mono, fontSize: 10, cursor: "pointer", textDecoration: "none", transition: "all .15s" }}>
        📖 API DOCS
      </a>
    </div>
  );
}

/* ─── PIPELINE BAR ───────────────────────────────────── */
function PipelineBar({ pipeState }) {
  const steps = [
    { id: 1, name: "Log Collection", tech: "BeautifulSoup4" },
    { id: 2, name: "Kafka Stream", tech: "10M+ events/sec" },
    { id: 3, name: "ML Detection", tech: "IsolationForest + LSTM" },
    { id: 4, name: "Risk Engine", tech: "NumPy CVSS 0–100" },
    { id: 5, name: "Auto Defence", tech: "Disable · Rotate · Alert" },
  ];
  return (
    <div style={{ display: "flex", marginBottom: 18, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden", background: C.bg1 }}>
      {steps.map((s, i) => {
        const state = pipeState[s.id] || "idle";
        const bg = state === "done" ? C.tealT : state === "running" ? C.amberT : "transparent";
        const numColor = state === "done" ? C.teal : state === "running" ? C.amber : C.txt2;
        return (
          <div key={s.id} style={{ flex: 1, padding: "10px 14px", background: bg, borderRight: i < 4 ? `1px solid ${C.border}` : "none", transition: "background .3s" }}>
            <div style={{ ...mono, fontSize: 9, color: numColor, letterSpacing: 1, marginBottom: 3, animation: state === "running" ? "blink .8s infinite" : "none" }}>STEP 0{s.id}</div>
            <div style={{ fontSize: 11, fontWeight: 700, color: state === "done" ? C.teal : C.txt0 }}>{s.name}</div>
            <div style={{ ...mono, fontSize: 9, color: C.txt2, marginTop: 2 }}>{s.tech}</div>
          </div>
        );
      })}
    </div>
  );
}

/* ─── CHART WRAPPER ──────────────────────────────────── */
function ChartCanvas({ id, height = 200, setup }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.Chart) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = setup(ref.current);
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [setup]);
  return (
    <div style={{ position: "relative", width: "100%", height }}>
      <canvas id={id} ref={ref} role="img" aria-label="ZombieGuard chart">Chart.</canvas>
    </div>
  );
}

/* ─── MAIN APP ───────────────────────────────────────── */
function App() {
  const [activePage, setActivePage] = useState("dashboard");
  const [scanning, setScanning] = useState(false);
  const [scanLog, setScanLog] = useState([]);
  const [scanDone, setScanDone] = useState(false);
  const [scanSummary, setScanSummary] = useState("");
  const [pipeState, setPipeState] = useState({});
  const [dashData, setDashData] = useState(null);
  const [defLog, setDefLog] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [parserData, setParserData] = useState(null);
  const [dbStats, setDbStats] = useState(null);
  const [auditLog, setAuditLog] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [mlTT, setMlTT] = useState(null);
  const [kafkaStats, setKafkaStats] = useState(null);
  const [badges, setBadges] = useState({ inv: null, alert: null });

  // load Chart.js
  useEffect(() => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js";
    document.head.appendChild(s);
  }, []);

  // health check
  useEffect(() => {
    apiFetch("/health").then(r => {
      if (r.status === "ok") {
        document.getElementById("sidebar-be") && (document.getElementById("sidebar-be").textContent = "✅ FastAPI online");
        document.getElementById("tb-status") && (document.getElementById("tb-status").textContent = "FastAPI connected · Ready");
      }
    }).catch(() => {
      document.getElementById("sidebar-be") && (document.getElementById("sidebar-be").textContent = "❌ Offline — run: python run.py");
    });
    loadParserStatus();
  }, []);

  const addLog = (text, type = "info") => {
    const ts = new Date().toLocaleTimeString("en-GB");
    setScanLog(l => [...l, { ts, text, type }]);
  };

  async function loadDashboard() {
    try {
      const r = await apiFetch("/api/dashboard");
      if (r.status !== "ok") return;
      const d = r.data;
      const tr = await apiFetch("/api/endpoints/top-risky?n=8");
      const dr2 = await apiFetch("/api/endpoints/distribution");
      setDashData({ ...d, topRisky: tr.data || [], bins: dr2.data?.bins || [] });
      setBadges({ inv: d.zombie + d.shadow, alert: d.critical_count });
    } catch {}
  }
  async function loadDefLog() {
    try { const r = await apiFetch("/api/defence"); if (r.status === "ok") setDefLog(r.data); } catch {}
  }
  async function loadAlerts() {
    try { const r = await apiFetch("/api/alerts?page_size=50"); if (r.status === "ok") setAlerts(r.data); } catch {}
  }
  async function loadParserStatus() {
    try { const r = await apiFetch("/api/parser-status"); if (r.status === "ok") setParserData(r.data); } catch {}
  }
  async function loadDBStats() {
    try { const r = await apiFetch("/api/db-stats"); if (r.status === "ok") setDbStats(r.data); } catch {}
  }
  async function loadAudit() {
    try { const r = await apiFetch("/api/audit?page_size=30"); if (r.status === "ok") setAuditLog(r.data); } catch {}
  }
  async function loadSessions() {
    try { const r = await apiFetch("/api/sessions"); if (r.status === "ok") setSessions(r.data); } catch {}
  }

  const navTo = (id) => {
    setActivePage(id);
    if (id === "dashboard") loadDashboard();
    if (id === "inventory") { /* InventoryPage self-loads */ }
    if (id === "defence") loadDefLog();
    if (id === "alertengine") loadAlerts();
    if (id === "dbstore") { loadDBStats(); loadAudit(); }
    if (id === "input") loadParserStatus();
    if (id === "sessions") loadSessions();
    if (id === "owasp" || id === "impact") loadDashboard();
    if (id === "kafka") apiFetch("/api/kafka-status").then(r => setKafkaStats(r.data)).catch(() => {});
  };

  async function doScan(cfg) {
    setScanning(true);
    setActivePage("scan");
    setScanLog([]);
    setScanDone(false);
    setPipeState({});

    const STEP_LOGS = [
      [["BeautifulSoup parsing Swagger HTML docs…","bs"],["BeautifulSoup parsing API Registry XML…","bs"],["Traffic fingerprinting shadow APIs via packet traces…","bs"],["CVE/NVD Pydantic-validated pattern feed: 14 patterns loaded","ok"]],
      [["Apache Kafka broker: 3 nodes, 5 partitioned topics","kafka"],["Publishing to api-gateway-logs topic…","kafka"],["Zero batch delay confirmed — real-time streaming","kafka"]],
      [["IsolationForest(n_estimators=200) training on 7-feature matrix…","ok"],["StandardScaler normalisation applied to feature vectors","ok"],["LSTM 30-day sliding window reconstruction errors computed","ok"]],
      [["NumPy vectorised CVSS scoring all endpoints simultaneously…","ok"],["SQL Alchemy persisting risk_scores + cve_matches to SQLite","ok"],["Kafka ml-output topic populated with classification scores","kafka"]],
      [["FastAPI decision: score≥80 → AUTO-DISABLE","err"],["Pydantic-validated API key rotation triggered for CRITICAL","warn"],["SecOps webhook → Slack + Email + PagerDuty dispatched","ok"],["SQL Alchemy audit_log: PCI-DSS compliant entries written","ok"]],
    ];

    let si = 0;
    const animInt = setInterval(() => {
      if (si >= 5) { clearInterval(animInt); return; }
      setPipeState(p => ({ ...p, [si + 1]: "running" }));
      STEP_LOGS[si].forEach((l, i) => setTimeout(() => addLog(l[0], l[1]), i * 130));
      si++;
    }, 520);

    try {
      const result = await apiPost("/api/scan", {
        contamination: (cfg?.cont || 15) / 100,
        staleness_days: cfg?.stale || 30,
        auto_disable: cfg?.autoDisable !== false,
        rotate_keys: cfg?.rotateKeys !== false,
        fire_webhook: cfg?.webhook !== false,
        deep_shadow: cfg?.shadow !== false,
        data_source: "synthetic",
      });
      clearInterval(animInt);
      setPipeState({ 1:"done",2:"done",3:"done",4:"done",5:"done" });
      const d = result.data;
      if (d.log_steps) d.log_steps.forEach(l => addLog("▶ " + l, "info"));
      addLog(`ML: IF=${d.ml_meta?.if_anomalies} anomalies · LSTM=${d.ml_meta?.lstm_anomalies} flags · train=${d.ml_meta?.train_time_s}s`, "ok");
      addLog(`Kafka: ${d.kafka_meta?.total_events_per_sec}M ev/sec · BS4: swagger=${d.parse_meta?.swagger_count} reg=${d.parse_meta?.registry_count} shadow=${d.parse_meta?.traffic_shadow_count}`, "bs");
      if (d.disabled > 0) addLog(`🔴 ${d.disabled} CRITICAL endpoints AUTO-DISABLED · API keys rotated`, "err");
      if (d.alerts > 0) addLog(`📨 ${d.alerts} alerts dispatched → Slack/Email/PagerDuty`, "ok");
      addLog(`✅ SCAN COMPLETE in ${d.scan_duration_s}s — SQL Alchemy session #${d.session_id}`, "ok");
      setScanSummary(`${d.total_apis} APIs · ${d.zombie} zombie · ${d.shadow} shadow · ${d.disabled} auto-disabled · ${d.alerts} alerts · ${d.scan_duration_s}s`);
      setScanDone(true);
      if (d.ml_meta?.train_time_s) setMlTT(d.ml_meta.train_time_s + "s");
      setBadges({ inv: d.zombie + d.shadow, alert: d.alerts });
      document.getElementById("tb-status") && (document.getElementById("tb-status").textContent = "Last scan: " + new Date().toLocaleTimeString());
      loadDashboard();
    } catch (e) {
      clearInterval(animInt);
      setPipeState({ 1:"done",2:"done",3:"done",4:"done",5:"idle" });
      addLog("❌ Error: " + e.message + " — Is the backend running? python run.py", "err");
    }
    setScanning(false);
  }

  // render pages
  const renderPage = () => {
    switch (activePage) {
      case "dashboard": return <DashboardPage data={dashData} />;
      case "scan": return <ScanPage onScan={doScan} scanning={scanning} scanLog={scanLog} scanDone={scanDone} scanSummary={scanSummary} pipeState={pipeState} />;
      case "input": return <InputPage parserData={parserData} />;
      case "kafka": return <KafkaPage stats={kafkaStats} />;
      case "mldetect": return <MLPage mlTT={mlTT} />;
      case "riskengine": return <RiskEnginePage />;
      case "dbstore": return <DBStorePage dbStats={dbStats} auditLog={auditLog} />;
      case "inventory": return <InventoryPage />;
      case "defence": return <DefencePage defLog={defLog} onRefresh={loadDefLog} />;
      case "alertengine": return <AlertPage alerts={alerts} />;
      case "owasp": return <OWASPPage data={dashData} />;
      case "impact": return <ImpactPage />;
      case "compare": return <ComparePage />;
      case "calculator": return <CalculatorPage />;
      case "sessions": return <SessionsPage sessions={sessions} />;
      default: return <EmptyState icon="◈" text="Page not found" />;
    }
  };

  return (
    <>
      <style>{GLOBAL_CSS}</style>
      <div style={{ display: "flex", minHeight: "100vh", position: "relative", zIndex: 1 }}>
        <Sidebar active={activePage} onNav={navTo} badges={badges} />
        <div style={{ marginLeft: 240, flex: 1, display: "flex", flexDirection: "column", minHeight: "100vh" }}>
          <Topbar active={activePage} onScan={() => doScan()} scanning={scanning} />
          <div style={{ flex: 1, padding: 18 }}>
            <PipelineBar pipeState={pipeState} />
            {renderPage()}
          </div>
        </div>
      </div>
    </>
  );
}

          <div style={{ ...mono, fontSize: 9, color: C.txt2 }}>M events/sec</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
        <Panel><PanelHdr title="Topic Throughput (Live)" /><ChartCanvas id="kafkaChart" height={200} setup={kafkaSetup} /></Panel>
        <Panel>
          <PanelHdr title="Topic Status — GET /api/kafka-status" />
          {stats ? Object.entries(stats.topics || {}).map(([name, info]) => (
            <div key={name} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: C.bg3, border: `1px solid ${C.border}`, borderRadius: 6, marginBottom: 6 }}>
              <div style={{ width: 32, height: 32, borderRadius: 6, background: C.purpleT, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, flexShrink: 0 }}>⚡</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, fontWeight: 700 }}>{name}</div>
                <div style={{ ...mono, fontSize: 9, color: C.purple }}>{info.events_per_sec}M/sec · partitions:{info.partitions} · lag:{info.lag}</div>
              </div>
              <div style={{ ...mono, fontSize: 9, color: C.txt2, textAlign: "right" }}>{info.produced} produced<br />{info.consumed} consumed</div>
            </div>
          )) : <EmptyState icon="⚡" text="Load kafka page to see live stats" />}
        </Panel>
      </div>
      <Panel>
        <PanelHdr title="Recent Kafka Events — GET /api/kafka-events" right={<Btn style={{ padding: "3px 9px", fontSize: 10 }} onClick={() => apiFetch("/api/kafka-events?topic=api-gateway-logs&n=15").then(r => setEvents(r.data))}>↺ Refresh</Btn>} />
        <div style={{ background: C.bg1, border: `1px solid ${C.border}`, borderRadius: 8, padding: 12, ...mono, fontSize: 10, lineHeight: 2, maxHeight: 200, overflowY: "auto" }}>
          {events.length === 0 ? <span style={{ color: C.txt2 }}>No events yet — run a scan to produce Kafka events</span> :
            events.map((m, i) => (
              <div key={i}><span style={{ color: C.txt3 }}>[{m.timestamp?.substring(11, 19)}]</span> <span style={{ color: C.purple }}>{m.key}</span> <span style={{ color: C.txt2 }}>offset={m.offset}</span> <span style={{ color: C.txt1 }}>{JSON.stringify(m.value).substring(0, 70)}…</span></div>
            ))}
        </div>
      </Panel>
    </div>
  );
}

/* ─── OWASP PAGE ─────────────────────────────────────── */
function OWASPPage({ data }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
      <Panel>
        <PanelHdr title="OWASP API Top 10 — Live from /api/dashboard" />
        {[["API1","Broken Object Level Authorization","owasp_api1"],["API3","Excessive Data Exposure (Zombie APIs)","owasp_api3"],["API7","Security Misconfiguration (no auth)","owasp_api7"],["API9","Improper Inventory Mgmt — Core PS9","owasp_api9"]].map(([tag,label,key]) => (
          <div key={tag} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: C.bg3, border: `1px solid ${C.border}`, borderRadius: 6, marginBottom: 6 }}>
            <span style={{ ...mono, fontSize: 9, padding: "2px 7px", borderRadius: 2, background: C.purpleT, color: C.purple, border: `1px solid ${C.purple}`, flexShrink: 0 }}>{tag}</span>
            <span style={{ flex: 1, fontSize: 11 }}>{label}</span>
            <span style={{ ...display, fontSize: 22, color: C.red }}>{data?.[key] || "—"}</span>
          </div>
        ))}
      </Panel>
      <Panel>
        <PanelHdr title="Impact Summary" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9 }}>
          <StatCard val="40%" label="Attack surface reduced" color={C.teal} />
          <StatCard val="$90K" label="Annual savings" color={C.amber} />
          <StatCard val="99%" label="Faster detection" color={C.purple} />
          <StatCard val="<3s" label="Auto-disable" color={C.red} />
        </div>
      </Panel>
    </div>
  );
}

const { useState, useEffect, useRef, useCallback } = React;
document.getElementById('loading').style.display = 'none';
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
